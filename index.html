<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Orbbotia Dinâmico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.css">
    <style>
        body { background-color: #f1f5f9; margin: 0; padding: 16px; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #meuKanban { display: flex; flex-grow: 1; align-items: stretch; overflow: hidden; position: relative; }
        .kanban-container { display: flex; overflow-x: auto; width: 100%; gap: 16px; padding-bottom: 8px; height: 100%; }
        
        /* Estilização Dinâmica e Genérica */
        .kanban-board { min-width: 290px; max-width: 290px; border-radius: 12px; display: flex; flex-direction: column; height: 100% !important; background: #f8fafc; border: 1px solid #e2e8f0; margin-right: 0; }
        .kanban-board-header { font-weight: 700; font-size: 0.95rem; color: #1e293b; padding: 14px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .kanban-drag { flex-grow: 1; overflow-y: auto; padding: 12px; min-height: 100px; }
        
        .kanban-item { background: #ffffff; border-radius: 10px; padding: 0; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .kanban-item:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); }
        
        .card-bloqueado { pointer-events: none !important; opacity: 0.6; }
        #loading-overlay { display: none; position: absolute; inset: 0; background: rgba(241, 245, 249, 0.7); backdrop-filter: blur(2px); z-index: 50; justify-content: center; align-items: center; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="barra-filtros" class="bg-white border border-slate-200 rounded-xl p-3 mb-4 flex flex-wrap items-center gap-4 shadow-sm" style="display: none;">
        <div class="flex items-center gap-2">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Prioridade:</label>
            <select id="filtro-prioridade" onchange="aplicarFiltros()" class="bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-700 py-1.5 px-2.5 outline-none">
                <option value="todos">Todas</option>
                <option value="urgent">🔴 Urgente</option>
                <option value="high">🟠 Alta</option>
                <option value="medium">🟡 Média</option>
                <option value="low">🔵 Baixa</option>
            </select>
        </div>
        <button onclick="limparFiltros()" class="text-xs font-bold text-slate-400 hover:text-indigo-600 ml-auto">Limpar</button>
    </div>

    <div id='loading' class="text-slate-500 font-medium p-4 flex items-center gap-2">
        <svg class="animate-spin h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <span>Configurando funil...</span>
    </div>
    
    <div id="meuKanban" class="kanban-container" style='display: none;'></div>

    <script src="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.js"></script>
    <script>
        const urlDados = 'https://n8n.orbbotia.com/webhook/kanban-dados';
        const urlAcao = 'https://n8n.orbbotia.com/webhook/kanban-acao';
        const urlColunas = 'https://n8n.orbbotia.com/webhook/kanban-colunas';

        let globalAccountId, globalConversationId, globalAgentId, globalAgentRole;
        let dadosLocaisOriginais = [];
        let colunasConfiguradas = [];
        let jKanbanInstance;

        window.addEventListener('message', async function (event) {
            let eventData = {};
            try { eventData = typeof event.data === 'string' ? JSON.parse(event.data) : event.data; } catch (e) { return; }

            if (eventData.event === 'appContext' && eventData.data) {
                const payload = eventData.data;
                globalAccountId = (payload.account && payload.account.id) || (payload.conversation && payload.conversation.account_id);
                globalConversationId = payload.conversation ? payload.conversation.id : null;
                
                document.getElementById('loading').style.display = 'flex';
                await carregarTudo();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('barra-filtros').style.display = 'flex';
            }
        });

        async function carregarTudo() {
            try {
                // Busca colunas E dados simultaneamente
                const [resColunas, resDados] = await Promise.all([
                    fetch(`${urlColunas}?account_id=${globalAccountId}`).then(r => r.json()),
                    fetch(`${urlDados}?account_id=${globalAccountId}`).then(r => r.json())
                ]);

                colunasConfiguradas = resColunas || [];
                dadosLocaisOriginais = Array.isArray(resDados) ? resDados : (resDados.data || []);

                renderizarKanban();
            } catch (e) {
                console.error("Erro ao carregar:", e);
            }
        }

        function renderizarKanban() {
            // Prepara a estrutura do jKanban baseada nas colunas vindas da API
            const boards = colunasConfiguradas.map(colName => ({
                id: colName,
                title: colName,
                item: []
            }));

            // Insere os cards nas colunas corretas
            dadosLocaisOriginais.forEach(item => {
                const cartao = item.json || item;
                const col = boards.find(b => b.id === cartao.etapa_funil);
                
                if (col) {
                    col.item.push({
                        id: String(cartao.conversation_id),
                        title: `
                            <div class="p-3">
                                <h4 class="font-bold text-sm text-slate-800">${cartao.cliente_nome || 'Sem Nome'}</h4>
                                <p class="text-xs text-slate-500">${cartao.ultima_mensagem || ''}</p>
                            </div>
                        `
                    });
                }
            });

            document.getElementById('meuKanban').innerHTML = '';
            jKanbanInstance = new jKanban({
                element: '#meuKanban',
                boards: boards,
                gutter: '0px',
                widthBoard: '290px',
                dropEl: function (el, target) {
                    const convId = el.dataset.eid;
                    const novaEtapa = target.parentElement.dataset.id;
                    fetch(urlAcao, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'mover', conversation_id: convId, etapa_funil: novaEtapa, account_id: globalAccountId })
                    });
                }
            });
        }

        // Avisa ao Chatwoot que estamos prontos
        window.parent.postMessage('chatwoot-dashboard-app:fetch-info', '*');
    </script>
</body>
</html>
