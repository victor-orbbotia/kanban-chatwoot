<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Orbbotia Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.css">
    <style>
        body { background-color: #f1f5f9; margin: 0; padding: 16px; font-family: system-ui, sans-serif; }
        #meuKanban { display: flex; height: calc(100vh - 40px); align-items: stretch; }
        .kanban-container { display: flex; overflow-x: auto; width: 100%; gap: 16px; padding-bottom: 8px; }
        
        /* Estilização das Colunas */
        .kanban-board { min-width: 290px; max-width: 290px; border-radius: 12px; display: flex; flex-direction: column; height: 100% !important; background: none; margin-right: 0; }
        .kanban-board[data-id="Triagem"] { background-color: #eff6ff; border: 1px solid #bfdbfe; }
        .kanban-board[data-id="Agendamento"] { background-color: #fffbeb; border: 1px solid #fde68a; }
        .kanban-board[data-id="Faturamento"] { background-color: #fdf2f8; border: 1px solid #fbcfe8; }
        .kanban-board[data-id="Concluído"] { background-color: #f0fdf4; border: 1px solid #bbf7d0; }
        
        .kanban-board-header { font-weight: 700; font-size: 0.95rem; color: #1e293b; padding: 14px; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .kanban-drag { flex-grow: 1; overflow-y: auto; padding: 12px; min-height: 100px; }
        
        /* Card Estilizado */
        .kanban-item { background: #ffffff; border-radius: 10px; padding: 0; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .kanban-item:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); border-color: #cbd5e1; }
        
        .card-bloqueado { pointer-events: none !important; opacity: 0.6; }
    </style>
</head>
<body>

    <div id='loading' class="text-slate-500 font-medium p-4">Carregando Funil Orbbotia...</div>
    <div id='meuKanban' class="kanban-container" style='display: none;'></div>

    <script src="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.js"></script>
    <script>
        const urlDados = 'https://n8n.orbbotia.com/webhook/kanban-dados';
        const urlMover = 'https://n8n.orbbotia.com/webhook/kanban-mover';
        const urlSalvarNota = 'https://n8n.orbbotia.com/webhook/kanban-salvar-nota';

        const colunas_do_funil = [
            { id: 'Triagem', title: 'Triagem 📥', item: [] },
            { id: 'Agendamento', title: 'Agendamento 📅', item: [] },
            { id: 'Faturamento', title: 'Faturamento 💰', item: [] },
            { id: 'Concluído', title: 'Concluído ✅', item: [] }
        ];

        let handshakeInterval;
        let realtimeInterval;
        let conectado = false;
        let globalAccountId, globalConversationId, globalAgentId, globalAgentRole;

        window.addEventListener('message', function (event) {
            let eventData = {};
            try {
                eventData = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            } catch (e) { return; }

            if (eventData.event === 'appContext' && eventData.data) {
                clearInterval(handshakeInterval);
                conectado = true;

                const payload = eventData.data;
                globalConversationId = payload.conversation ? payload.conversation.id : null;
                globalAccountId = (payload.account && payload.account.id) || (payload.conversation && payload.conversation.account_id);
                globalAgentId = payload.current_agent ? payload.current_agent.id : null;
                globalAgentRole = payload.current_agent ? payload.current_agent.role : 'agent';

                if (globalConversationId && globalAccountId) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('meuKanban').style.display = 'flex';
                    
                    // Inicializa e ativa o Loop de Tempo Real (7000ms = 7 segundos)
                    inicializarPainelKanban();
                    clearInterval(realtimeInterval);
                    realtimeInterval = setInterval(inicializarPainelKanban, 7000);
                }
            }
        });

        handshakeInterval = setInterval(function() {
            if (!conectado) {
                window.parent.postMessage('chatwoot-dashboard-app:fetch-info', '*');
            }
        }, 500);

        function inicializarPainelKanban() {
            // Se o operador estiver digitando alguma nota, pausamos a atualização automática para não apagar o texto dele
            if (document.activeElement && document.activeElement.classList.contains('input-nota')) {
                return;
            }

            let urlFinal = `${urlDados}?account_id=${globalAccountId}`;
            if (globalAgentRole === 'agent' && globalAgentId) {
                urlFinal += `&agent_id=${globalAgentId}`;
            }

            fetch(urlFinal)
                .then(response => response.json())
                .then(dadosBrutos => {
                    colunas_do_funil.forEach(c => c.item = []);
                    let lista = Array.isArray(dadosBrutos) ? dadosBrutos : (dadosBrutos.data || []);

                    lista.forEach(item => {
                        const cartao = item.json ? item.json : item;
                        const col = colunas_do_funil.find(c => c.id === cartao.etapa_funil);
                        
                        if(col) {
                            const ehConversaAtual = cartao.conversation_id == globalConversationId;
                            const temFoto = cartao.avatar_url && cartao.avatar_url.trim() !== "" && cartao.avatar_url !== "null";
                            const primeiraLetra = cartao.cliente_nome ? cartao.cliente_nome.charAt(0) : '?';
                            const notaAtual = cartao.notas_contato || '';

                            const cardHTML = `
                                <div class="p-3 select-none relative ${ehConversaAtual ? 'border-l-4 border-indigo-600' : ''}">
                                    
                                    <!-- TOPO: Info Usuário -->
                                    <div class="flex items-center gap-3 mb-2.5">
                                        <div class="w-10 h-10 min-w-[40px] rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold uppercase overflow-hidden shadow-sm">
                                            ${temFoto ? `<img src="${cartao.avatar_url}" class="w-full h-full object-cover">` : primeiraLetra}
                                        </div>
                                        <div class="overflow-hidden">
                                            <h4 class="font-bold text-sm truncate text-slate-800 leading-tight">${cartao.cliente_nome || 'Sem Nome'}</h4>
                                            <p class="text-[11px] font-medium text-slate-400 mt-0.5">${cartao.phone_number || 'Sem WhatsApp'}</p>
                                        </div>
                                    </div>
                                    
                                    <!-- CORPO: Mensagem -->
                                    <div class="space-y-2 pt-2 border-t border-slate-100">
                                        <div class="bg-slate-50 p-2 rounded text-[11px] text-slate-600 border border-slate-100/50">
                                            <span class="font-bold text-slate-400 block text-[9px] uppercase tracking-wider mb-0.5">Última Mensagem</span>
                                            <p class="italic truncate">${cartao.ultima_mensagem || 'Nenhuma mensagem gravada...'}</p>
                                        </div>
                                    </div>

                                    <!-- Rodapé interativo isolado -->
                                    <div class="mt-2 note-area">
                                        <div class="bg-slate-50/50 border border-dashed border-slate-200 focus-within:border-indigo-300 focus-within:bg-white p-2 rounded flex flex-col">
                                            <span class="font-bold text-slate-400 block text-[9px] uppercase tracking-wider mb-0.5">Nota Kanban 🗒_</span>
                                            <textarea id="nota-${cartao.conversation_id}" data-convid="${cartao.conversation_id}" class="input-nota w-full bg-transparent text-[11px] text-slate-700 border-none outline-none resize-none placeholder-slate-300 focus:ring-0 p-0" rows="1" placeholder="Clique para digitar uma nota...">${notaAtual}</textarea>
                                            <button id="btn-nota-${cartao.conversation_id}" data-convid="${cartao.conversation_id}" data-account="${globalAccountId}" class="btn-salvar-nota hidden mt-1.5 self-end bg-indigo-600 hover:bg-indigo-700 text-white text-[9px] font-bold py-1 px-2.5 rounded transition-colors shadow-sm">SALVAR</button>
                                        </div>
                                    </div>

                                    <!-- Link de Texto Blindado para Abrir Chat -->
                                    <div class="mt-2 text-right">
                                        <span data-convid="${cartao.conversation_id}" class="btn-link-chat text-[11px] font-bold text-indigo-600 hover:text-indigo-800 hover:underline cursor-pointer inline-flex items-center gap-0.5">
                                            Ver Conversa ↗
                                        </span>
                                    </div>
                                </div>
                            `;

                            col.item.push({
                                id: String(cartao.conversation_id),
                                title: cardHTML
                            });
                        }
                    });

                    document.getElementById('meuKanban').innerHTML = '';

                    new jKanban({
                        element: '#meuKanban',
                        boards: colunas_do_funil,
                        gutter: '0px',
                        widthBoard: '290px',
                        dropEl: function (el, target) {
                            const conversationId = el.dataset.eid;
                            const novaEtapa = target.parentElement.dataset.id;
                            
                            fetch(urlMover, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    conversation_id: conversationId,
                                    etapa_funil: novaEtapa,
                                    account_id: globalAccountId
                                })
                            });
                        }
                    });

                    // 🛠️ ESCUTADORES JAVASCRIPT ISOLADOS

                    // 1. Abertura de Conversa Pelo Link Blindado
                    document.querySelectorAll('.btn-link-chat').forEach(link => {
                        link.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            const idConversa = this.getAttribute('data-convid');
                            if (idConversa) {
                                window.parent.postMessage({
                                    event: 'setConversation',
                                    conversationId: Number(idConversa)
                                }, '*');
                            }
                        });
                    });

                    // 2. Monitorar Digitação
                    document.querySelectorAll('.input-nota').forEach(txt => {
                        txt.addEventListener('focus', (e) => e.stopPropagation());
                        txt.addEventListener('mousedown', (e) => e.stopPropagation());
                        txt.addEventListener('input', function() {
                            const id = this.dataset.convid;
                            document.getElementById(`btn-nota-${id}`).classList.remove('hidden');
                        });
                    });

                    // 3. Salvar Nota
                    document.querySelectorAll('.btn-salvar-nota').forEach(btn => {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const convId = this.dataset.convid;
                            const accId = this.dataset.account;
                            processarSalvamentoNota(convId, accId, this);
                        });
                    });
                });
        }

        function processarSalvamentoNota(convId, accountId, btnElement) {
            const texto = document.getElementById(`nota-${convId}`).value;
            const cardItemElement = btnElement.closest('.kanban-item');
            if (cardItemElement) cardItemElement.classList.add('card-bloqueado');

            btnElement.innerText = 'SALVANDO...';
            btnElement.disabled = true;

            fetch(urlSalvarNota, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    conversation_id: convId,
                    account_id: accountId,
                    notas_contato: texto
                })
            }).then(response => {
                btnElement.innerText = 'SALVO ✓';
                btnElement.classList.replace('bg-indigo-600', 'bg-emerald-600');
                btnElement.classList.replace('hover:bg-indigo-700', 'hover:bg-emerald-700');
                
                setTimeout(() => {
                    btnElement.classList.add('hidden');
                    btnElement.innerText = 'SALVAR';
                    btnElement.disabled = false;
                    btnElement.classList.replace('bg-emerald-600', 'bg-indigo-600');
                    btnElement.classList.replace('hover:bg-emerald-700', 'hover:bg-indigo-700');
                    if (cardItemElement) cardItemElement.classList.remove('card-bloqueado');
                }, 1500);
            }).catch(() => {
                btnElement.innerText = 'ERRO!';
                btnElement.classList.replace('bg-indigo-600', 'bg-rose-600');
                btnElement.disabled = false;
                if (cardItemElement) cardItemElement.classList.remove('card-bloqueado');
            });
        }
    </script>
</body>
</html>
