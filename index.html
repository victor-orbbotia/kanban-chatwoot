<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Orbbotia Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.css">
    <style>
        body { background-color: #f1f5f9; margin: 0; padding: 16px; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #meuKanban { display: flex; flex-grow: 1; align-items: stretch; overflow: hidden; position: relative; }
        .kanban-container { display: flex; overflow-x: auto; width: 100%; gap: 16px; padding-bottom: 8px; height: 100%; }
        
        /* Colunas Genéricas para qualquer etapa */
        .kanban-board { 
            min-width: 290px; 
            max-width: 290px; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            height: 100% !important; 
            margin-right: 0; 
            border: 1px solid transparent; /* Será colorida dinamicamente pelo JS */
            transition: all 0.3s ease;
        }
        .kanban-board-header { 
            font-weight: 700; 
            font-size: 0.95rem; 
            color: #1e293b; 
            padding: 14px; 
            border-bottom: 1px solid rgba(0,0,0,0.03); 
        }
        .kanban-drag { flex-grow: 1; overflow-y: auto; padding: 12px; min-height: 100px; }
        
        .kanban-item { background: #ffffff; border-radius: 10px; padding: 0; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .kanban-item:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); border-color: #cbd5e1; }
        
        .card-bloqueado { pointer-events: none !important; opacity: 0.6; }
        #loading-overlay { display: none; position: absolute; inset: 0; background: rgba(241, 245, 249, 0.7); backdrop-filter: blur(2px); z-index: 50; justify-content: center; align-items: center; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="barra-filtros" class="bg-white border border-slate-200 rounded-xl p-3 mb-4 flex flex-wrap items-center gap-4 shadow-sm" style="display: none;">
        <div class="flex items-center gap-2">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Prioridade:</label>
            <select id="filtro-prioridade" onchange="aplicarFiltros()" class="bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-700 py-1.5 px-2.5 outline-none focus:border-indigo-500">
                <option value="todos">Todas</option>
                <option value="urgent">🔴 Urgente</option>
                <option value="high">🟠 Alta</option>
                <option value="medium">🟡 Média</option>
                <option value="low">🔵 Baixa</option>
                <option value="Nenhuma">⚪ Sem Prioridade</option>
            </select>
        </div>

        <div class="flex items-center gap-2">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Etiqueta:</label>
            <select id="filtro-etiqueta" onchange="aplicarFiltros()" class="bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-700 py-1.5 px-2.5 outline-none focus:border-indigo-500 max-w-[200px]">
                <option value="todos">Todas</option>
            </select>
        </div>
        
        <button onclick="limparFiltros()" class="text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors ml-auto">Limpar Filtros</button>
    </div>

    <div id='loading' class="text-slate-500 font-medium p-4 flex items-center gap-2">
        <svg class="animate-spin h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <span>Sincronizando Funil com o Chatwoot...</span>
    </div>
    
    <div class="relative flex-grow">
        <div id="loading-overlay">
            <div class="bg-white p-3 rounded-lg shadow-lg flex items-center gap-3 text-sm font-bold text-slate-600">
                <svg class="animate-spin h-4 w-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Processando...
            </div>
        </div>
        <div id='meuKanban' class="kanban-container" style='display: none;'></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.js"></script>
    <script>
        const urlDados = 'https://n8n.orbbotia.com/webhook/kanban-dados';
        const urlAcao = 'https://n8n.orbbotia.com/webhook/kanban-acao';
        const urlColunas = 'https://n8n.orbbotia.com/webhook/kanban-colunas'; // Novo endpoint n8n

        let handshakeInterval, realtimeInterval, conectado = false;
        let globalAccountId, globalConversationId, globalAgentId, globalAgentRole;
        
        let dadosLocaisOriginais = []; 
        let colunasConfiguradas = []; // Substitui a constante hardcoded
        let cartoesExpandidos = new Set(); 

        window.addEventListener('message', function (event) {
            let eventData = {};
            try { eventData = typeof event.data === 'string' ? JSON.parse(event.data) : event.data; } catch (e) { return; }

            if (eventData.event === 'appContext' && eventData.data) {
                clearInterval(handshakeInterval);
                conectado = true;

                const payload = eventData.data;
                globalConversationId = payload.conversation ? payload.conversation.id : null;
                globalAccountId = (payload.account && payload.account.id) || (payload.conversation && payload.conversation.account_id);
                globalAgentId = payload.current_agent ? payload.current_agent.id : null;
                globalAgentRole = payload.current_agent ? payload.current_agent.role : 'agent';

                if (globalAccountId) {
                    document.getElementById('barra-filtros').style.display = 'flex';
                    document.getElementById('meuKanban').style.display = 'flex';
                    
                    carregarTudo();
                    
                    clearInterval(realtimeInterval);
                    realtimeInterval = setInterval(carregarTudo, 12000);

                    document.addEventListener('visibilitychange', function() {
                        if (document.hidden) {
                            clearInterval(realtimeInterval);
                        } else {
                            carregarTudo();
                            realtimeInterval = setInterval(carregarTudo, 12000);
                        }
                    });
                }
            }
        });

        handshakeInterval = setInterval(function() {
            if (!conectado) window.parent.postMessage('chatwoot-dashboard-app:fetch-info', '*');
        }, 500);

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (dadosLocaisOriginais.length > 0) aplicarFiltrosSilencioso();
            }, 300);
        });

        async function carregarTudo() {
            if (document.querySelector('.card-bloqueado')) return;
            if (document.activeElement && (document.activeElement.classList.contains('input-nota') || document.activeElement.classList.contains('input-edit'))) return;

            let urlDadosFinal = `${urlDados}?account_id=${globalAccountId}`;
            if (globalAgentRole === 'agent' && globalAgentId) urlDadosFinal += `&agent_id=${globalAgentId}`;

            try {
                // Buscando colunas dinâmicas e dados ao mesmo tempo
                const [resColunas, resDados] = await Promise.all([
                    fetch(`${urlColunas}?account_id=${globalAccountId}`),
                    fetch(urlDadosFinal)
                ]);

                if (!resColunas.ok || !resDados.ok) throw new Error("Erro HTTP");

                const resColunasJSON = await resColunas.json();
                
                // Tratamento para garantir a leitura independente de vir Objeto ou Array puro do n8n
                colunasConfiguradas = resColunasJSON.colunas ? resColunasJSON.colunas : (Array.isArray(resColunasJSON) ? resColunasJSON : []);

                const dadosBrutos = await resDados.json();

                document.getElementById('loading').style.display = 'none';
                dadosLocaisOriginais = Array.isArray(dadosBrutos) ? dadosBrutos : (dadosBrutos.data || []);
                
                atualizarListaDeEtiquetasNoSeletor();
                aplicarFiltrosSilencioso();

            } catch (erro) {
                console.error("Falha ao sincronizar com n8n/Chatwoot:", erro);
            }
        }

        function atualizarListaDeEtiquetasNoSeletor() {
            const seletor = document.getElementById('filtro-etiqueta');
            const valorSelecionadoAntes = seletor.value;
            let todasEtiquetas = new Set();
            
            dadosLocaisOriginais.forEach(item => {
                const c = item.json ? item.json : item;
                if (Array.isArray(c.etiquetas)) c.etiquetas.forEach(tag => {
                    if (tag && tag.trim() !== "") todasEtiquetas.add(tag.trim());
                });
            });

            seletor.innerHTML = '<option value="todos">Todas</option>';
            Array.from(todasEtiquetas).sort().forEach(tag => {
                seletor.innerHTML += `<option value="${tag}">${tag}</option>`;
            });

            if (Array.from(todasEtiquetas).includes(valorSelecionadoAntes)) {
                seletor.value = valorSelecionadoAntes;
            }
        }

        function aplicarFiltros() {
            document.getElementById('loading-overlay').style.display = 'flex';
            setTimeout(() => {
                aplicarFiltrosSilencioso();
                document.getElementById('loading-overlay').style.display = 'none';
            }, 300);
        }

        function aplicarFiltrosSilencioso() {
            const prio = document.getElementById('filtro-prioridade').value;
            const tag = document.getElementById('filtro-etiqueta').value;

            let dadosFiltrados = dadosLocaisOriginais.filter(item => {
                const c = item.json ? item.json : item;
                const batePrio = (prio === 'todos') || (c.prioridade === prio);
                const bateTag = (tag === 'todos') || (Array.isArray(c.etiquetas) && c.etiquetas.map(t => t.trim()).includes(tag));
                return batePrio && bateTag;
            });
            renderizarPainelKanban(dadosFiltrados);
        }

        function limparFiltros() {
            document.getElementById('filtro-prioridade').value = 'todos';
            document.getElementById('filtro-etiqueta').value = 'todos';
            aplicarFiltros();
        }

        function renderizarPainelKanban(listaDeCards) {
            const kanbanContainerDOM = document.querySelector('.kanban-container');
            const scrollX = kanbanContainerDOM ? kanbanContainerDOM.scrollLeft : 0;
            const scrollY = {};
            document.querySelectorAll('.kanban-drag').forEach(col => {
                scrollY[col.parentElement.dataset.id] = col.scrollTop;
            });

            // Cores pastel rotativas para as colunas dinâmicas
            const paletaCores = [
                { bg: '#eff6ff', border: '#bfdbfe' }, // Azul (Triagem original)
                { bg: '#fffbeb', border: '#fde68a' }, // Amarelo (Agendamento original)
                { bg: '#fdf2f8', border: '#fbcfe8' }, // Rosa (Faturamento original)
                { bg: '#f0fdf4', border: '#bbf7d0' }, // Verde (Concluído original)
                { bg: '#faf5ff', border: '#e9d5ff' }, // Roxo 
                { bg: '#f0fdfa', border: '#99f6e4' }  // Teal
            ];

            // Cria o formato aceito pelo jKanban usando as colunas dinâmicas
            let painelBoards = colunasConfiguradas.map(colName => ({
                id: colName,
                title: colName,
                item: []
            }));

            const contadores = {};
            colunasConfiguradas.forEach(c => contadores[c] = 0);

            listaDeCards.forEach(item => {
                const cartao = item.json ? item.json : item;
                const col = painelBoards.find(c => c.id === cartao.etapa_funil);
                
                if(col) {
                    contadores[cartao.etapa_funil]++;
                    const convIdStr = String(cartao.conversation_id);
                    const ehConversaAtual = cartao.conversation_id == globalConversationId;
                    const temFoto = cartao.avatar_url && cartao.avatar_url.trim() !== "" && cartao.avatar_url !== "null";
                    const primeiraLetra = cartao.cliente_nome ? cartao.cliente_nome.charAt(0) : '?';
                    const notaAtual = cartao.notas_contato || '';
                    
                    const mapaPrioCores = { urgent: '🔴 Urgente', high: '🟠 Alta', medium: '🟡 Média', low: '🔵 Baixa' };
                    const textoPrio = mapaPrioCores[cartao.prioridade] || '';

                    let tagsHTML = '';
                    if (Array.isArray(cartao.etiquetas)) {
                        cartao.etiquetas.forEach(t => {
                            if (t && t.trim() !== "") {
                                tagsHTML += `<span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded border border-indigo-100/50">${t.trim()}</span>`;
                            }
                        });
                    }

                    const estaExpandido = cartoesExpandidos.has(convIdStr);
                    const classOculta = estaExpandido ? '' : 'hidden';
                    const textoBotaoExp = estaExpandido ? 'Recolher Card ↙' : 'Expandir Card ↗';

                    const cardHTML = `
                        <div class="p-3 select-none relative id-card-${cartao.conversation_id} ${ehConversaAtual ? 'border-l-4 border-indigo-600' : ''}">
                            
                            <div class="flex items-start gap-3 mb-2">
                                <div class="w-10 h-10 min-w-[40px] rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold uppercase overflow-hidden shadow-sm mt-1">
                                    ${temFoto ? `<img src="${cartao.avatar_url}" class="w-full h-full object-cover">` : primeiraLetra}
                                </div>
                                <div class="overflow-hidden flex-grow">
                                    <h4 class="font-bold text-sm truncate text-slate-800 leading-tight">${cartao.cliente_nome || 'Sem Nome'}</h4>
                                    <p class="text-[11px] font-medium text-slate-400 mt-0.5 mb-1">${cartao.phone_number || 'Sem WhatsApp'}</p>
                                    
                                    <div class="flex flex-wrap items-center gap-1">
                                        ${textoPrio ? `<span class="text-[9px] font-extrabold whitespace-nowrap bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded border border-slate-200/60">${textoPrio}</span>` : ''}
                                        ${tagsHTML}
                                    </div>
                                </div>
                            </div>

                            <div id="extra-${cartao.conversation_id}" class="${classOculta} mt-2 pt-2 border-t border-slate-100 space-y-2.5 note-area">
                                
                                <div class="p-2.5 bg-slate-50 border border-slate-200 rounded-lg space-y-2">
                                    <div>
                                        <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1">Alterar Prioridade</label>
                                        <select id="edit-prio-${cartao.conversation_id}" class="input-edit w-full bg-white border border-slate-200 rounded p-1.5 text-[11px] font-medium text-slate-700 outline-none focus:border-indigo-500">
                                            <option value="Nenhuma" ${cartao.prioridade === 'Nenhuma' || !cartao.prioridade ? 'selected' : ''}>⚪ Nenhuma</option>
                                            <option value="urgent" ${cartao.prioridade === 'urgent' ? 'selected' : ''}>🔴 Urgente</option>
                                            <option value="high" ${cartao.prioridade === 'high' ? 'selected' : ''}>🟠 Alta</option>
                                            <option value="medium" ${cartao.prioridade === 'medium' ? 'selected' : ''}>🟡 Média</option>
                                            <option value="low" ${cartao.prioridade === 'low' ? 'selected' : ''}>🔵 Baixa</option>
                                        </select>
                                    </div>

                                    ${tagsHTML ? `
                                    <div>
                                        <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1">Etiquetas Ativas</span>
                                        <div class="flex flex-wrap gap-1">${tagsHTML}</div>
                                    </div>
                                    ` : ''}
                                </div>

                                <div class="bg-slate-50 p-2.5 rounded text-[11px] text-slate-600 border border-slate-100/50">
                                    <span class="font-bold text-slate-400 block text-[9px] uppercase tracking-wider mb-0.5">Última Mensagem</span>
                                    <p class="whitespace-pre-wrap break-words italic text-slate-700">${cartao.ultima_mensagem || 'Nenhuma...'}</p>
                                </div>

                                <div class="bg-slate-50/50 border border-dashed border-slate-200 focus-within:border-indigo-300 focus-within:bg-white p-2 rounded flex flex-col">
                                    <span class="font-bold text-slate-400 block text-[9px] uppercase tracking-wider mb-0.5">Nota Kanban 🗒_</span>
                                    <textarea id="nota-${cartao.conversation_id}" data-convid="${cartao.conversation_id}" class="input-nota w-full bg-transparent text-[11px] text-slate-700 border-none outline-none resize-none placeholder-slate-300 focus:ring-0 p-0" rows="3" placeholder="Digite as notas aqui...">${notaAtual}</textarea>
                                </div>

                                <button id="btn-nota-${cartao.conversation_id}" data-convid="${cartao.conversation_id}" data-account="${globalAccountId}" class="btn-salvar-nota w-full bg-indigo-600 hover:bg-indigo-700 text-white text-[11px] font-bold py-2 px-2.5 rounded transition-colors shadow-sm text-center">
                                    💾 SALVAR ALTERAÇÕES
                                </button>
                            </div>

                            <div class="mt-2.5 pt-2 border-t border-slate-50 flex items-center justify-between text-[11px]">
                                <span data-convid="${cartao.conversation_id}" class="btn-expandir font-bold text-slate-400 hover:text-slate-600 cursor-pointer">
                                    ${textoBotaoExp}
                                </span>
                                <span data-convid="${cartao.conversation_id}" class="btn-link-chat font-bold text-indigo-600 hover:text-indigo-800 hover:underline cursor-pointer">
                                    Ir para o Chat 💬
                                </span>
                            </div>
                        </div>
                    `;

                    col.item.push({ id: convIdStr, title: cardHTML });
                }
            });

            // Atualiza os títulos das colunas com as contagens
            painelBoards.forEach(c => {
                const qtd = contadores[c.id] || 0;
                c.title = `${c.id} <span class="bg-indigo-100/80 text-indigo-700 text-[10px] ml-1 px-2 py-0.5 rounded-full font-extrabold">${qtd}</span>`;
            });

            document.getElementById('meuKanban').innerHTML = '';

            // Inicializa o jKanban
            new jKanban({
                element: '#meuKanban',
                boards: painelBoards,
                gutter: '0px',
                widthBoard: '290px',
                dropEl: function (el, target) {
                    const conversationId = el.dataset.eid;
                    const novaEtapa = target.parentElement.dataset.id;
                    
                    fetch(urlAcao, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            action: 'mover',
                            conversation_id: conversationId, 
                            etapa_funil: novaEtapa, 
                            account_id: globalAccountId 
                        })
                    }).catch(e => console.error("Erro ao mover:", e));
                }
            });

            // Aplica as cores da paleta rotativa em cada coluna renderizada
            document.querySelectorAll('.kanban-board').forEach((board, index) => {
                const cor = paletaCores[index % paletaCores.length]; 
                board.style.backgroundColor = cor.bg;
                board.style.borderColor = cor.border;
            });

            // Aplica a Memória de Scroll
            const novoContainer = document.querySelector('.kanban-container');
            if (novoContainer) novoContainer.scrollLeft = scrollX;
            document.querySelectorAll('.kanban-drag').forEach(col => {
                const boardId = col.parentElement.dataset.id;
                if (scrollY[boardId]) col.scrollTop = scrollY[boardId];
            });

            vincularEventosCards();
        }

        function vincularEventosCards() {
            document.querySelectorAll('.btn-link-chat').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault(); e.stopPropagation();
                    const idConversa = this.getAttribute('data-convid');
                    if (idConversa) window.parent.location.href = `https://chat.orbbotia.com/app/accounts/${globalAccountId}/conversations/${idConversa}`;
                });
            });

            document.querySelectorAll('.btn-expandir').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.getAttribute('data-convid');
                    const divExtra = document.getElementById(`extra-${id}`);
                    if (divExtra.classList.contains('hidden')) {
                        divExtra.classList.remove('hidden');
                        cartoesExpandidos.add(id); 
                        this.innerText = 'Recolher Card ↙';
                    } else {
                        divExtra.classList.add('hidden');
                        cartoesExpandidos.delete(id); 
                        this.innerText = 'Expandir Card ↗';
                    }
                });
            });

            document.querySelectorAll('.input-nota, .input-edit').forEach(txt => {
                txt.addEventListener('focus', (e) => e.stopPropagation());
                txt.addEventListener('mousedown', (e) => e.stopPropagation());
            });

            document.querySelectorAll('.btn-salvar-nota').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const convId = this.dataset.convid;
                    const accId = this.dataset.account;
                    processarSalvamentoTotal(convId, accId, this);
                });
            });
        }

        function processarSalvamentoTotal(convId, accountId, btnElement) {
            const textoNota = document.getElementById(`nota-${convId}`).value;
            const prioridade = document.getElementById(`edit-prio-${convId}`).value;

            const cardItemElement = btnElement.closest('.kanban-item');
            if (cardItemElement) cardItemElement.classList.add('card-bloqueado');

            btnElement.innerText = 'SALVANDO...';
            btnElement.disabled = true;

            fetch(urlAcao, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'salvar',
                    conversation_id: convId, 
                    account_id: accountId, 
                    notas_contato: textoNota,
                    prioridade: prioridade
                })
            }).then(response => {
                btnElement.innerText = 'SALVO ✓';
                btnElement.classList.replace('bg-indigo-600', 'bg-emerald-600');
                btnElement.classList.replace('hover:bg-indigo-700', 'hover:bg-emerald-700');
                
                setTimeout(() => {
                    btnElement.innerText = '💾 SALVAR ALTERAÇÕES';
                    btnElement.disabled = false;
                    btnElement.classList.replace('bg-emerald-600', 'bg-indigo-600');
                    btnElement.classList.replace('hover:bg-emerald-700', 'hover:bg-indigo-700');
                    if (cardItemElement) cardItemElement.classList.remove('card-bloqueado');
                    
                    carregarTudo(); 
                }, 1500);
            }).catch(() => {
                btnElement.innerText = 'ERRO!';
                btnElement.classList.replace('bg-indigo-600', 'bg-rose-600');
                btnElement.disabled = false;
                if (cardItemElement) cardItemElement.classList.remove('card-bloqueado');
            });
        }
    </script>
</body>
</html>
