<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Orbbotia Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.css">
    <style>
        body { background-color: #f1f5f9; margin: 0; padding: 16px; font-family: system-ui, sans-serif; }
        #meuKanban { display: flex; height: calc(100vh - 40px); align-items: stretch; }
        .kanban-container { display: flex; overflow-x: auto; width: 100%; gap: 16px; padding-bottom: 8px; }
        
        /* Estilização das Colunas */
        .kanban-board { min-width: 290px; max-width: 290px; border-radius: 12px; display: flex; flex-direction: column; height: 100% !important; background: none; margin-right: 0; }
        .kanban-board[data-id="Triagem"] { background-color: #eff6ff; border: 1px solid #bfdbfe; }
        .kanban-board[data-id="Agendamento"] { background-color: #fffbeb; border: 1px solid #fde68a; }
        .kanban-board[data-id="Faturamento"] { background-color: #fdf2f8; border: 1px solid #fbcfe8; }
        .kanban-board[data-id="Concluído"] { background-color: #f0fdf4; border: 1px solid #bbf7d0; }
        
        .kanban-board-header { font-weight: 700; font-size: 0.95rem; color: #1e293b; padding: 14px; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .kanban-drag { flex-grow: 1; overflow-y: auto; padding: 12px; min-height: 100px; }
        
        /* Card */
        .kanban-item { background: #ffffff; border-radius: 10px; padding: 0; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s ease; }
        .kanban-item:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); border-color: #cbd5e1; }
    </style>
</head>
<body>

    <div id='loading' class="text-slate-500 font-medium p-4">Carregando Funil Orbbotia...</div>
    <div id='meuKanban' class="kanban-container" style='display: none;'></div>

    <script src="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.js"></script>
    <script>
        const urlDados = 'https://n8n.orbbotia.com/webhook/kanban-dados';
        const urlMover = 'https://n8n.orbbotia.com/webhook/kanban-mover';
        const urlSalvarNota = 'https://n8n.orbbotia.com/webhook/kanban-salvar-nota'; // Novo webhook

        const colunas_do_funil = [
            { id: 'Triagem', title: 'Triagem 📥', item: [] },
            { id: 'Agendamento', title: 'Agendamento 📅', item: [] },
            { id: 'Faturamento', title: 'Faturamento 💰', item: [] },
            { id: 'Concluído', title: 'Concluído ✅', item: [] }
        ];

        let handshakeInterval;
        let conectado = false;

        window.addEventListener('message', function (event) {
            let eventData = {};
            try {
                eventData = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            } catch (e) { return; }

            if (eventData.event === 'appContext' && eventData.data) {
                clearInterval(handshakeInterval);
                conectado = true;

                const payload = eventData.data;
                const conversationId = payload.conversation ? payload.conversation.id : null;
                const accountId = (payload.account && payload.account.id) || (payload.conversation && payload.conversation.account_id);
                const agentId = payload.current_agent ? payload.current_agent.id : null;
                const agentRole = payload.current_agent ? payload.current_agent.role : 'agent';

                if (conversationId && accountId) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('meuKanban').style.display = 'flex';
                    
                    inicializarPainelKanban(accountId, conversationId, agentId, agentRole);
                }
            }
        });

        handshakeInterval = setInterval(function() {
            if (!conectado) {
                window.parent.postMessage('chatwoot-dashboard-app:fetch-info', '*');
            }
        }, 500);

        function inicializarPainelKanban(accountId, currentConversationId, agentId, agentRole) {
            let urlFinal = `${urlDados}?account_id=${accountId}`;
            if (agentRole === 'agent' && agentId) {
                urlFinal += `&agent_id=${agentId}`;
            }

            fetch(urlFinal)
                .then(response => response.json())
                .then(dadosBrutos => {
                    colunas_do_funil.forEach(c => c.item = []);
                    let lista = Array.isArray(dadosBrutos) ? dadosBrutos : (dadosBrutos.data || []);

                    lista.forEach(item => {
                        const cartao = item.json ? item.json : item;
                        const col = colunas_do_funil.find(c => c.id === cartao.etapa_funil);
                        
                        if(col) {
                            const ehConversaAtual = cartao.conversation_id == currentConversationId;
                            const temFoto = cartao.avatar_url && cartao.avatar_url.trim() !== "" && cartao.avatar_url !== "null";
                            const primeiraLetra = cartao.cliente_nome ? cartao.cliente_nome.charAt(0) : '?';
                            const notaAtual = cartao.notas_contato || '';

                            const cardHTML = `
                                <div class="p-3 select-none open-chat-trigger ${ehConversaAtual ? 'border-l-4 border-indigo-600' : ''}" data-convid="${cartao.conversation_id}">
                                    
                                    <div class="flex items-center gap-3 mb-3">
                                        <div class="w-10 h-10 min-w-[40px] rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold uppercase overflow-hidden shadow-sm">
                                            ${temFoto ? `<img src="${cartao.avatar_url}" class="w-full h-full object-cover">` : primeiraLetra}
                                        </div>
                                        <div class="overflow-hidden">
                                            <h4 class="font-bold text-sm truncate text-slate-800 leading-tight">${cartao.cliente_nome || 'Sem Nome'}</h4>
                                            <p class="text-[11px] font-medium text-slate-400 mt-0.5">${cartao.phone_number || 'Sem WhatsApp'}</p>
                                        </div>
                                    </div>
                                    
                                    <div class="space-y-1.5 pt-2 border-t border-slate-100">
                                        <div class="bg-slate-50 p-2 rounded text-[11px] text-slate-600">
                                            <span class="font-bold text-slate-400 block text-[9px] uppercase tracking-wider mb-0.5">Última Mensagem</span>
                                            <p class="italic truncate">${cartao.ultima_mensagem || 'Nenhuma mensagem gravada...'}</p>
                                        </div>
                                        
                                        <!-- Bloco Editável de Notas -->
                                        <div class="bg-amber-50/70 border border-amber-100 p-2 rounded flex flex-col note-area" onclick="event.stopPropagation();">
                                            <span class="font-bold text-amber-500 block text-[9px] uppercase tracking-wider mb-0.5">Nota Interna 🗒️</span>
                                            <textarea id="nota-${cartao.conversation_id}" onmousedown="event.stopPropagation();" oninput="mostrarBotaoSalvar(${cartao.conversation_id})" class="w-full bg-transparent text-[11px] text-amber-900 border-none outline-none resize-none placeholder-amber-300 focus:ring-0 p-0" rows="2" placeholder="Clique para digitar uma nota...">${notaAtual}</textarea>
                                            <button id="btn-nota-${cartao.conversation_id}" onclick="salvarNota(${cartao.conversation_id}, ${accountId}, event)" class="hidden mt-1 self-end bg-amber-500 hover:bg-amber-600 text-white text-[9px] font-bold py-1 px-2 rounded transition-colors shadow-sm">SALVAR</button>
                                        </div>
                                    </div>
                                </div>
                            `;

                            col.item.push({
                                id: String(cartao.conversation_id),
                                title: cardHTML
                            });
                        }
                    });

                    document.getElementById('meuKanban').innerHTML = '';

                    new jKanban({
                        element: '#meuKanban',
                        boards: colunas_do_funil,
                        gutter: '0px',
                        widthBoard: '290px',
                        dropEl: function (el, target) {
                            const conversationId = el.dataset.eid;
                            const novaEtapa = target.parentElement.dataset.id;
                            
                            fetch(urlMover, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    conversation_id: conversationId,
                                    etapa_funil: novaEtapa,
                                    account_id: accountId
                                })
                            });
                        }
                    });

                    document.querySelectorAll('.open-chat-trigger').forEach(card => {
                        card.addEventListener('click', function(e) {
                            // Só abre o chat se não clicou na área da nota
                            if (!e.target.closest('.note-area')) {
                                const targetId = this.getAttribute('data-convid');
                                if (targetId) {
                                    window.parent.postMessage({
                                        event: 'setConversation',
                                        conversationId: Number(targetId)
                                    }, '*');
                                }
                            }
                        });
                    });
                });
        }

        // Funções de salvamento da nota
        function mostrarBotaoSalvar(convId) {
            document.getElementById(`btn-nota-${convId}`).classList.remove('hidden');
        }

        function salvarNota(convId, accountId, event) {
            event.stopPropagation();
            const texto = document.getElementById(`nota-${convId}`).value;
            const btn = document.getElementById(`btn-nota-${convId}`);
            
            btn.innerText = 'SALVANDO...';
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            fetch(urlSalvarNota, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    conversation_id: convId,
                    account_id: accountId,
                    notas_contato: texto
                })
            }).then(response => {
                btn.innerText = 'SALVO ✓';
                btn.classList.replace('bg-amber-500', 'bg-green-500');
                btn.classList.replace('hover:bg-amber-600', 'hover:bg-green-600');
                
                setTimeout(() => {
                    btn.classList.add('hidden');
                    btn.innerText = 'SALVAR';
                    btn.classList.replace('bg-green-500', 'bg-amber-500');
                    btn.classList.replace('hover:bg-green-600', 'hover:bg-amber-600');
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }, 2000);
            }).catch(() => {
                btn.innerText = 'ERRO!';
                btn.classList.replace('bg-amber-500', 'bg-red-500');
            });
        }
    </script>
</body>
</html>
