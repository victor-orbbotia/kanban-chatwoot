<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Orbbotia Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.css">
    <style>
        body { background-color: #f1f5f9; margin: 0; padding: 16px; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #meuKanban { display: flex; flex-grow: 1; align-items: stretch; overflow: hidden; }
        .kanban-container { display: flex; overflow-x: auto; width: 100%; gap: 16px; padding-bottom: 8px; height: 100%; }
        
        /* Estilização das Colunas */
        .kanban-board { min-width: 290px; max-width: 290px; border-radius: 12px; display: flex; flex-direction: column; height: 100% !important; background: none; margin-right: 0; }
        .kanban-board[data-id="Triagem"] { background-color: #eff6ff; border: 1px solid #bfdbfe; }
        .kanban-board[data-id="Agendamento"] { background-color: #fffbeb; border: 1px solid #fde68a; }
        .kanban-board[data-id="Faturamento"] { background-color: #fdf2f8; border: 1px solid #fbcfe8; }
        .kanban-board[data-id="Concluído"] { background-color: #f0fdf4; border: 1px solid #bbf7d0; }
        
        .kanban-board-header { font-weight: 700; font-size: 0.95rem; color: #1e293b; padding: 14px; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .kanban-drag { flex-grow: 1; overflow-y: auto; padding: 12px; min-height: 100px; }
        
        /* Card Estilizado */
        .kanban-item { background: #ffffff; border-radius: 10px; padding: 0; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .kanban-item:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); border-color: #cbd5e1; }
        
        .card-bloqueado { pointer-events: none !important; opacity: 0.6; }
    </style>
</head>
<body>

    <!-- BARRA DE FILTROS SUPERIOR -->
    <div id="barra-filtros" class="bg-white border border-slate-200 rounded-xl p-3 mb-4 flex flex-wrap items-center gap-4 shadow-sm" style="display: none;">
        <div class="flex items-center gap-2">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Prioridade:</label>
            <select id="filtro-prioridade" onchange="aplicarFiltros()" class="bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-700 py-1.5 px-2.5 outline-none focus:border-indigo-500">
                <option value="todos">Todas</option>
                <option value="urgent">🔴 Urgente</option>
                <option value="high">🟠 Alta</option>
                <option value="medium">🟡 Média</option>
                <option value="low">🔵 Baixa</option>
                <option value="Nenhuma">⚪ Sem Prioridade</option>
            </select>
        </div>

        <div class="flex items-center gap-2">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Etiqueta:</label>
            <select id="filtro-etiqueta" onchange="aplicarFiltros()" class="bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-700 py-1.5 px-2.5 outline-none focus:border-indigo-500 max-w-[200px]">
                <option value="todos">Todas</option>
            </select>
        </div>
        
        <button onclick="limparFiltros()" class="text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors ml-auto">Limpar Filtros</button>
    </div>

    <div id='loading' class="text-slate-500 font-medium p-4">Carregando Funil Orbbotia...</div>
    <div id='meuKanban' class="kanban-container" style='display: none;'></div>

    <script src="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.js"></script>
    <script>
        const urlDados = 'https://n8n.orbbotia.com/webhook/kanban-dados';
        const urlMover = 'https://n8n.orbbotia.com/webhook/kanban-mover';
        const urlSalvarNota = 'https://n8n.orbbotia.com/webhook/kanban-salvar-nota';

        const colunas_do_funil = [
            { id: 'Triagem', title: 'Triagem', item: [] },
            { id: 'Agendamento', title: 'Agendamento', item: [] },
            { id: 'Faturamento', title: 'Faturamento', item: [] },
            { id: 'Concluído', title: 'Concluído', item: [] }
        ];

        let handshakeInterval, realtimeInterval, conectado = false;
        let globalAccountId, globalConversationId, globalAgentId, globalAgentRole;
        let dadosLocaisOriginais = []; // Guarda o cache para os filtros funcionarem rápido

        window.addEventListener('message', function (event) {
            let eventData = {};
            try { eventData = typeof event.data === 'string' ? JSON.parse(event.data) : event.data; } catch (e) { return; }

            if (eventData.event === 'appContext' && eventData.data) {
                clearInterval(handshakeInterval);
                conectado = true;

                const payload = eventData.data;
                globalConversationId = payload.conversation ? payload.conversation.id : null;
                globalAccountId = (payload.account && payload.account.id) || (payload.conversation && payload.conversation.account_id);
                globalAgentId = payload.current_agent ? payload.current_agent.id : null;
                globalAgentRole = payload.current_agent ? payload.current_agent.role : 'agent';

                if (globalConversationId && globalAccountId) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('barra-filtros').style.display = 'flex';
                    document.getElementById('meuKanban').style.display = 'flex';
                    
                    carregarDadosDoServidor();
                    clearInterval(realtimeInterval);
                    realtimeInterval = setInterval(carregarDadosDoServidor, 7000);
                }
            }
        });

        handshakeInterval = setInterval(function() {
            if (!conectado) window.parent.postMessage('chatwoot-dashboard-app:fetch-info', '*');
        }, 500);

        function carregarDadosDoServidor() {
            if (document.activeElement && document.activeElement.classList.contains('input-nota')) return;

            let urlFinal = `${urlDados}?account_id=${globalAccountId}`;
            if (globalAgentRole === 'agent' && globalAgentId) urlFinal += `&agent_id=${globalAgentId}`;

            fetch(urlFinal)
                .then(response => response.json())
                .then(dadosBrutos => {
                    dadosLocaisOriginais = Array.isArray(dadosBrutos) ? dadosBrutos : (dadosBrutos.data || []);
                    atualizarListaDeEtiquetasNoSeletor();
                    renderizarPainelKanban(dadosLocaisOriginais);
                });
        }

        // Popula o <select> de etiquetas dinamicamente com base nas marcas dos clientes reais
        function atualizarListaDeEtiquetasNoSeletor() {
            const seletor = document.getElementById('filtro-etiqueta');
            const valorSelecionadoAntes = seletor.value;
            
            let todasEtiquetas = new Set();
            dadosLocaisOriginais.forEach(item => {
                const c = item.json ? item.json : item;
                if (Array.isArray(c.etiquetas)) {
                    c.etiquetas.forEach(tag => todasEtiquetas.add(tag));
                }
            });

            seletor.innerHTML = '<option value="todos">Todas</option>';
            Array.from(todasEtiquetas).sort().forEach(tag => {
                seletor.innerHTML += `<option value="${tag}">${tag}</option>`;
            });

            if (Array.from(todasEtiquetas).includes(valorSelecionadoAntes)) {
                seletor.value = valorSelecionadoAntes;
            }
        }

        function aplicarFiltros() {
            const prio = document.getElementById('filtro-prioridade').value;
            const tag = document.getElementById('filtro-etiqueta').value;

            let dadosFiltrados = dadosLocaisOriginais.filter(item => {
                const c = item.json ? item.json : item;
                
                const batePrio = (prio === 'todos') || (c.prioridade === prio);
                const bateTag = (tag === 'todos') || (Array.isArray(c.etiquetas) && c.etiquetas.includes(tag));
                
                return batePrio && bateTag;
            });

            renderizarPainelKanban(dadosFiltrados);
        }

        function limparFiltros() {
            document.getElementById('filtro-prioridade').value = 'todos';
            document.getElementById('filtro-etiqueta').value = 'todos';
            renderizarPainelKanban(dadosLocaisOriginais);
        }

        function renderizarPainelKanban(listaDeCards) {
            colunas_do_funil.forEach(c => c.item = []);
            const contadores = { Triagem: 0, Agendamento: 0, Faturamento: 0, Concluído: 0 };

            listaDeCards.forEach(item => {
                const cartao = item.json ? item.json : item;
                const col = colunas_do_funil.find(c => c.id === cartao.etapa_funil);
                
                if(col) {
                    contadores[cartao.etapa_funil]++;
                    const ehConversaAtual = cartao.conversation_id == globalConversationId;
                    const temFoto = cartao.avatar_url && cartao.avatar_url.trim() !== "" && cartao.avatar_url !== "null";
                    const primeiraLetra = cartao.cliente_nome ? cartao.cliente_nome.charAt(0) : '?';
                    const notaAtual = cartao.notas_contato || '';
                    
                    // Emblemas de Cores para as Prioridades
                    const mapaPrioCores = { urgent: '🔴 Urgente', high: '🟠 Alta', medium: '🟡 Média', low: '🔵 Baixa' };
                    const textoPrio = mapaPrioCores[cartao.prioridade] || '';

                    // Montagem das Tags Visuais dentro do Card expandido
                    let tagsHTML = '';
                    if (Array.isArray(cartao.etiquetas)) {
                        cartao.etiquetas.forEach(t => {
                            tagsHTML += `<span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded border border-indigo-100/50">${t}</span>`;
                        });
                    }

                    const cardHTML = `
                        <div class="p-3 select-none relative id-card-${cartao.conversation_id} ${ehConversaAtual ? 'border-l-4 border-indigo-600' : ''}">
                            
                            <!-- TOPO: Info Usuário -->
                            <div class="flex items-center gap-3 mb-2">
                                <div class="w-10 h-10 min-w-[40px] rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold uppercase overflow-hidden shadow-sm">
                                    ${temFoto ? `<img src="${cartao.avatar_url}" class="w-full h-full object-cover">` : primeiraLetra}
                                        </div>
                                <div class="overflow-hidden">
                                    <div class="flex items-center gap-1.5 overflow-hidden">
                                        <h4 class="font-bold text-sm truncate text-slate-800 leading-tight max-w-[150px]">${cartao.cliente_nome || 'Sem Nome'}</h4>
                                        ${textoPrio ? `<span class="text-[9px] font-extrabold whitespace-nowrap bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">${textoPrio.split(' ')[0]}</span>` : ''}
                                    </div>
                                    <p class="text-[11px] font-medium text-slate-400 mt-0.5">${cartao.phone_number || 'Sem WhatsApp'}</p>
                                </div>
                            </div>

                            <!-- ÁREA EXPANSÍVEL -->
                            <div id="extra-${cartao.conversation_id}" class="hidden mt-2 pt-2 border-t border-slate-100 space-y-2.5 note-area">
                                
                                <!-- Meta Informações Adicionadas (Prioridade e Etiquetas) -->
                                <div class="space-y-1 text-[11px]">
                                    ${textoPrio ? `<div><span class="text-slate-400 font-bold">Prioridade:</span> <span class="font-medium text-slate-700">${textoPrio}</span></div>` : ''}
                                    ${tagsHTML ? `<div class="flex flex-wrap gap-1 mt-1"><span class="text-slate-400 font-bold block w-full mb-0.5">Etiquetas:</span> ${tagsHTML}</div>` : ''}
                                </div>

                                <!-- Mensagem Completa -->
                                <div class="bg-slate-50 p-2.5 rounded text-[11px] text-slate-600 border border-slate-100/50">
                                    <span class="font-bold text-slate-400 block text-[9px] uppercase tracking-wider mb-0.5">Última Mensagem</span>
                                    <p class="whitespace-pre-wrap break-words italic text-slate-700">${cartao.ultima_mensagem || 'Nenhuma...'}</p>
                                </div>

                                <!-- Bloco de Notas -->
                                <div class="bg-slate-50/50 border border-dashed border-slate-200 focus-within:border-indigo-300 focus-within:bg-white p-2 rounded flex flex-col">
                                    <span class="font-bold text-slate-400 block text-[9px] uppercase tracking-wider mb-0.5">Nota Kanban 🗒_</span>
                                    <textarea id="nota-${cartao.conversation_id}" data-convid="${cartao.conversation_id}" class="input-nota w-full bg-transparent text-[11px] text-slate-700 border-none outline-none resize-none placeholder-slate-300 focus:ring-0 p-0" rows="5" placeholder="Digite as notas aqui...">${notaAtual}</textarea>
                                    <button id="btn-nota-${cartao.conversation_id}" data-convid="${cartao.conversation_id}" data-account="${globalAccountId}" class="btn-salvar-nota hidden mt-1.5 self-end bg-indigo-600 hover:bg-indigo-700 text-white text-[9px] font-bold py-1 px-2.5 rounded transition-colors shadow-sm">SALVAR NOTA</button>
                                </div>
                            </div>

                            <!-- LINKS DE CONTROLE INFERIORES -->
                            <div class="mt-2.5 pt-2 border-t border-slate-50 flex items-center justify-between text-[11px]">
                                <span data-convid="${cartao.conversation_id}" class="btn-expandir font-bold text-slate-400 hover:text-slate-600 cursor-pointer">
                                    Expandir Card ↗
                                </span>
                                <span data-convid="${cartao.conversation_id}" class="btn-link-chat font-bold text-indigo-600 hover:text-indigo-800 hover:underline cursor-pointer">
                                    Ir para o Chat 💬
                                </span>
                            </div>
                        </div>
                    `;

                    col.item.push({ id: String(cartao.conversation_id), title: cardHTML });
                }
            });

            colunas_do_funil.forEach(c => {
                const qtd = contadores[c.id] || 0;
                c.title = `${c.id} (${qtd})`;
            });

            document.getElementById('meuKanban').innerHTML = '';

            new jKanban({
                element: '#meuKanban',
                boards: colunas_do_funil,
                gutter: '0px',
                widthBoard: '290px',
                dropEl: function (el, target) {
                    const conversationId = el.dataset.eid;
                    const novaEtapa = target.parentElement.dataset.id;
                    
                    fetch(urlMover, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            conversation_id: conversationId,
                            etapa_funil: novaEtapa,
                            account_id: globalAccountId
                        })
                    });
                }
            });

            // Re-vincular eventos
            document.querySelectorAll('.btn-link-chat').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault(); e.stopPropagation();
                    const idConversa = this.getAttribute('data-convid');
                    if (idConversa) window.parent.location.href = `https://chat.orbbotia.com/app/accounts/${globalAccountId}/conversations/${idConversa}`;
                });
            });

            document.querySelectorAll('.btn-expandir').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.getAttribute('data-convid');
                    const divExtra = document.getElementById(`extra-${id}`);
                    if (divExtra.classList.contains('hidden')) {
                        divExtra.classList.remove('hidden');
                        this.innerText = 'Recolher Card ↙';
                    } else {
                        divExtra.classList.add('hidden');
                        this.innerText = 'Expandir Card ↗';
                    }
                });
            });

            document.querySelectorAll('.input-nota').forEach(txt => {
                txt.addEventListener('focus', (e) => e.stopPropagation());
                txt.addEventListener('mousedown', (e) => e.stopPropagation());
                txt.addEventListener('input', function() {
                    const id = this.dataset.convid;
                    document.getElementById(`btn-nota-${id}`).classList.remove('hidden');
                });
            });

            document.querySelectorAll('.btn-salvar-nota').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const convId = this.dataset.convid;
                    const accId = this.dataset.account;
                    processarSalvamentoNota(convId, accId, this);
                });
            });
        }

        function processarSalvamentoNota(convId, accountId, btnElement) {
            const texto = document.getElementById(`nota-${convId}`).value;
            const cardItemElement = btnElement.closest('.kanban-item');
            if (cardItemElement) cardItemElement.classList.add('card-bloqueado');

            btnElement.innerText = 'SALVANDO...';
            btnElement.disabled = true;

            fetch(urlSalvarNota, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ conversation_id: convId, account_id: accountId, notas_contato: texto })
            }).then(response => {
                btnElement.innerText = 'SALVO ✓';
                btnElement.classList.replace('bg-indigo-600', 'bg-emerald-600');
                btnElement.classList.replace('hover:bg-indigo-700', 'hover:bg-emerald-700');
                
                setTimeout(() => {
                    btnElement.classList.add('hidden');
                    btnElement.innerText = 'SALVAR NOTA';
                    btnElement.disabled = false;
                    btnElement.classList.replace('bg-emerald-600', 'bg-indigo-600');
                    btnElement.classList.replace('hover:bg-indigo-700', 'hover:bg-indigo-700');
                    if (cardItemElement) cardItemElement.classList.remove('card-bloqueado');
                }, 1500);
            }).catch(() => {
                btnElement.innerText = 'ERRO!';
                btnElement.classList.replace('bg-indigo-600', 'bg-rose-600');
                btnElement.disabled = false;
                if (cardItemElement) cardItemElement.classList.remove('card-bloqueado');
            });
        }
    </script>
</body>
</html>
